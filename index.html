<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Signage Dashboard</title>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #131826;
    --panel-2: #1a2138;
    --border: #232b42;
    --accent: #4f7cff;
    --text: #eef1f8;
    --muted: #7c88a6;
    --green: #33c17a;
    --red: #e2574c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px; border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.2rem; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 0.85rem; }
  button {
    background: var(--accent); color: white; border: none;
    padding: 10px 16px; border-radius: 8px; font-size: 0.9rem;
    cursor: pointer; font-weight: 600;
  }
  button.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  input, select {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 9px 12px; border-radius: 8px; font-size: 0.9rem;
  }
  main { max-width: 1100px; margin: 0 auto; padding: 28px; }
  section { margin-bottom: 40px; }
  section h2 { font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }

  #loginBox {
    max-width: 360px; margin: 80px auto; padding: 32px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
  }
  #loginBox input { width: 100%; margin-bottom: 12px; }
  #loginBox button { width: 100%; }
  #loginError { color: var(--red); font-size: 0.85rem; margin-top: 8px; min-height: 18px; }

  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
  .toolbar .filters { display: flex; gap: 8px; }

  table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 12px; overflow: hidden; }
  th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
  th { color: var(--muted); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 8px; }
  .dot.online { background: var(--green); }
  .dot.offline { background: var(--red); }

  .bulkBar {
    display: none; align-items: center; gap: 10px; background: var(--panel-2);
    border: 1px solid var(--accent); padding: 10px 16px; border-radius: 8px; margin-bottom: 14px;
  }
  .bulkBar.visible { display: flex; }
  .bulkBar span { color: var(--muted); font-size: 0.85rem; }

  #playlistItems { display: flex; flex-direction: column; gap: 8px; margin: 14px 0; }
  .item-row { display: flex; gap: 8px; align-items: center; background: var(--panel-2); padding: 8px 10px; border-radius: 8px; }
  .item-row input { flex: 1; }
  .item-row button { background: var(--red); padding: 6px 10px; }

  .badge { background: var(--panel-2); color: var(--muted); font-size: 0.75rem; padding: 3px 8px; border-radius: 6px; }

  #app { display: none; }
</style>
</head>
<body>

  <div id="loginBox">
    <h2 style="margin-top:0">Sign in</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Sign in</button>
    <div id="loginError"></div>
  </div>

  <div id="app">
    <header>
      <div>
        <h1>Signage Dashboard</h1>
        <div class="sub" id="screenCount">0 screens</div>
      </div>
      <button class="secondary" onclick="logout()">Sign out</button>
    </header>

    <main>
      <section>
        <h2>Add a screen</h2>
        <div class="row">
          <input id="pairCode" placeholder="Pairing code (e.g. K7QX2M)" style="text-transform:uppercase" />
          <input id="pairName" placeholder="Screen name (e.g. Mall Entrance)" />
          <input id="pairLocation" placeholder="Location / group (e.g. Delhi Store)" />
          <button onclick="addScreen()">Pair screen</button>
        </div>
      </section>

      <section>
        <h2>Screens</h2>

        <div class="toolbar">
          <div class="filters">
            <select id="locationFilter" onchange="renderScreens()">
              <option value="">All locations</option>
            </select>
            <select id="statusFilter" onchange="renderScreens()">
              <option value="">All statuses</option>
              <option value="online">Online only</option>
              <option value="offline">Offline only</option>
            </select>
          </div>
          <span class="badge" id="lastRefreshed">live</span>
        </div>

        <div class="bulkBar" id="bulkBar">
          <span id="bulkCount">0 selected</span>
          <select id="bulkPlaylistSelect"><option value="">— assign playlist —</option></select>
          <button onclick="applyBulkPlaylist()">Apply to selected</button>
          <button class="secondary" onclick="clearSelection()">Clear</button>
        </div>

        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)" /></th>
              <th>Status</th><th>Name</th><th>Location</th><th>Playlist</th><th>Last seen</th><th></th>
            </tr>
          </thead>
          <tbody id="screensBody"></tbody>
        </table>
      </section>

      <section>
        <h2>New playlist</h2>
        <div class="row">
          <input id="playlistName" placeholder="Playlist name" />
        </div>
        <div id="playlistItems"></div>
        <div class="row">
          <button class="secondary" onclick="addPlaylistItemRow()">+ Add item</button>
          <button onclick="savePlaylist()">Save playlist</button>
        </div>
      </section>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script>
  // ===================== CONFIG =====================
  const firebaseConfig = {
  apiKey: "AIzaSyBq6nQFLJBQvEdOUjg7KtzpaWZ4H1reb6c",
  authDomain: "my-signage-app-d0b8a.firebaseapp.com",
  projectId: "my-signage-app-d0b8a",
  storageBucket: "my-signage-app-d0b8a.firebasestorage.app",
  messagingSenderId: "1004716989793",
  appId: "1:1004716989793:web:bba0b9234929e3373e3920",
  measurementId: "G-Y8X4WK2YS5"
};
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // ===================== AUTH =====================
  function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    auth.signInWithEmailAndPassword(email, password)
      .catch(err => document.getElementById("loginError").textContent = err.message);
  }
  function logout() { auth.signOut(); }

  auth.onAuthStateChanged(user => {
    document.getElementById("loginBox").style.display = user ? "none" : "block";
    document.getElementById("app").style.display = user ? "block" : "none";
    if (user) {
      watchScreens();
      watchPlaylists();
    }
  });

  // ===================== STATE =====================
  let playlistsCache = [];
  let screensCache = [];
  let selectedScreenIds = new Set();

  // ===================== SCREENS =====================
  function addScreen() {
    const code = document.getElementById("pairCode").value.trim().toUpperCase();
    const name = document.getElementById("pairName").value.trim();
    const location = document.getElementById("pairLocation").value.trim();
    if (!code || !name) return alert("Enter both the pairing code and a name.");

    const ref = db.collection("screens").doc(code);
    ref.get().then(doc => {
      if (!doc.exists) {
        alert("No screen found with that code. Make sure the TV is showing this exact code.");
        return;
      }
      ref.update({ status: "paired", name: name, location: location || "Unassigned" })
        .then(() => {
          document.getElementById("pairCode").value = "";
          document.getElementById("pairName").value = "";
          document.getElementById("pairLocation").value = "";
        });
    });
  }

  function watchScreens() {
    db.collection("screens").onSnapshot(snapshot => {
      screensCache = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      updateLocationFilterOptions();
      renderScreens();
      document.getElementById("lastRefreshed").textContent =
        "updated " + new Date().toLocaleTimeString();
    });
  }

  function updateLocationFilterOptions() {
    const select = document.getElementById("locationFilter");
    const current = select.value;
    const locations = [...new Set(screensCache.map(s => s.location || "Unassigned"))].sort();
    select.innerHTML = '<option value="">All locations</option>' +
      locations.map(l => `<option value="${l}">${l}</option>`).join("");
    select.value = current;
  }

  function isOnline(s) {
    const lastSeenMs = s.lastSeen ? s.lastSeen.toMillis() : 0;
    return Date.now() - lastSeenMs < 120000; // seen in last 2 min
  }

  function renderScreens() {
    const locationFilter = document.getElementById("locationFilter").value;
    const statusFilter = document.getElementById("statusFilter").value;

    let filtered = screensCache.filter(s => {
      if (locationFilter && (s.location || "Unassigned") !== locationFilter) return false;
      if (statusFilter === "online" && !isOnline(s)) return false;
      if (statusFilter === "offline" && isOnline(s)) return false;
      return true;
    });

    // Offline-first sorting so problems surface immediately
    filtered.sort((a, b) => Number(isOnline(a)) - Number(isOnline(b)));

    document.getElementById("screenCount").textContent = filtered.length + " screens";

    const body = document.getElementById("screensBody");
    body.innerHTML = "";

    filtered.forEach(s => {
      const online = isOnline(s);
      const lastSeenMs = s.lastSeen ? s.lastSeen.toMillis() : 0;
      const checked = selectedScreenIds.has(s.id) ? "checked" : "";

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><input type="checkbox" data-id="${s.id}" ${checked} onchange="toggleSelect('${s.id}', this.checked)" /></td>
        <td><span class="dot ${online ? 'online' : 'offline'}"></span>${online ? 'Online' : 'Offline'}</td>
        <td>${s.name || '(unnamed - ' + s.id + ')'}</td>
        <td>${s.location || 'Unassigned'}</td>
        <td>${playlistDropdown(s.id, s.currentPlaylist)}</td>
        <td>${lastSeenMs ? new Date(lastSeenMs).toLocaleTimeString() : '—'}</td>
        <td>
          <button class="secondary" onclick="sendCommand('${s.id}', 'refresh')" title="Reload content on this screen">Refresh</button>
          <button class="secondary" onclick="sendCommand('${s.id}', 'reboot')" title="Restart the app on this screen">Reboot</button>
          <button class="secondary" onclick="removeScreen('${s.id}')">Remove</button>
        </td>
      `;
      body.appendChild(tr);
    });

    updateBulkBar();
  }

  function playlistDropdown(screenId, currentPlaylistId) {
    const options = playlistsCache.map(p =>
      `<option value="${p.id}" ${p.id === currentPlaylistId ? 'selected' : ''}>${p.name}</option>`
    ).join("");
    return `<select onchange="assignPlaylist('${screenId}', this.value)">
              <option value="">— none —</option>${options}
            </select>`;
  }

  function assignPlaylist(screenId, playlistId) {
    db.collection("screens").doc(screenId).update({ currentPlaylist: playlistId || null });
  }

  function sendCommand(screenId, command) {
    const label = command === "reboot" ? "reboot" : "refresh content on";
    if (!confirm(`Send a remote ${label} to this screen?`)) return;
    db.collection("screens").doc(screenId).update({ command: command });
  }

  function removeScreen(screenId) {
    if (!confirm("Remove this screen? The device will show the pairing screen again.")) return;
    db.collection("screens").doc(screenId).update({ status: "unpaired", currentPlaylist: null, name: null });
    selectedScreenIds.delete(screenId);
  }

  // ===================== SELECTION / BULK ACTIONS =====================
  function toggleSelect(id, checked) {
    if (checked) selectedScreenIds.add(id); else selectedScreenIds.delete(id);
    updateBulkBar();
  }

  function toggleSelectAll(checkbox) {
    const rows = document.querySelectorAll('#screensBody input[type="checkbox"]');
    rows.forEach(r => {
      r.checked = checkbox.checked;
      const id = r.getAttribute("data-id");
      if (checkbox.checked) selectedScreenIds.add(id); else selectedScreenIds.delete(id);
    });
    updateBulkBar();
  }

  function clearSelection() {
    selectedScreenIds.clear();
    renderScreens();
  }

  function updateBulkBar() {
    const bar = document.getElementById("bulkBar");
    const count = selectedScreenIds.size;
    document.getElementById("bulkCount").textContent = count + " selected";
    bar.classList.toggle("visible", count > 0);

    const select = document.getElementById("bulkPlaylistSelect");
    select.innerHTML = '<option value="">— assign playlist —</option>' +
      playlistsCache.map(p => `<option value="${p.id}">${p.name}</option>`).join("");
  }

  function applyBulkPlaylist() {
    const playlistId = document.getElementById("bulkPlaylistSelect").value;
    if (!playlistId) return alert("Choose a playlist first.");
    if (selectedScreenIds.size === 0) return;

    const batch = db.batch();
    selectedScreenIds.forEach(id => {
      batch.update(db.collection("screens").doc(id), { currentPlaylist: playlistId });
    });
    batch.commit().then(() => {
      alert(`Assigned playlist to ${selectedScreenIds.size} screen(s).`);
      clearSelection();
    });
  }

  // ===================== PLAYLISTS =====================
  function watchPlaylists() {
    db.collection("playlists").onSnapshot(snapshot => {
      playlistsCache = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderScreens();
    });
  }

  function addPlaylistItemRow() {
    const container = document.getElementById("playlistItems");
    const row = document.createElement("div");
    row.className = "item-row";
    row.innerHTML = `
      <select class="itemType">
        <option value="image">Image</option>
        <option value="video">Video</option>
      </select>
      <input class="itemUrl" placeholder="Media URL (GitHub raw / Imgur / Drive link)" />
      <input class="itemDuration" type="number" placeholder="Seconds (images only)" value="8" style="width:120px" />
      <button onclick="this.parentElement.remove()">✕</button>
    `;
    container.appendChild(row);
  }

  function savePlaylist() {
    const name = document.getElementById("playlistName").value.trim();
    if (!name) return alert("Give the playlist a name.");

    const rows = document.querySelectorAll("#playlistItems .item-row");
    if (rows.length === 0) return alert("Add at least one item.");

    const items = Array.from(rows).map(row => ({
      type: row.querySelector(".itemType").value,
      url: row.querySelector(".itemUrl").value.trim(),
      durationSeconds: parseInt(row.querySelector(".itemDuration").value) || 8
    }));

    db.collection("playlists").add({ name, items, createdAt: firebase.firestore.FieldValue.serverTimestamp() })
      .then(() => {
        document.getElementById("playlistName").value = "";
        document.getElementById("playlistItems").innerHTML = "";
        alert("Playlist saved. Assign it to a screen from the Screens table above.");
      });
  }

  addPlaylistItemRow();
  </script>
</body>
</html>
