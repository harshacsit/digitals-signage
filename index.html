<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Signage Dashboard</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="loginBox">
    <h2>Sign in</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Sign in</button>
    <div id="loginError"></div>
  </div>

  <div id="app">
    <div class="appShell">
      <aside class="sidebar">
        <div class="brand">Signage</div>
        <nav>
          <button class="navBtn active" onclick="switchView('screensView', this)">🖥️ Screens</button>
          <button class="navBtn" onclick="switchView('playlistsView', this)">🎬 Playlists</button>
        </nav>
        <button class="secondary signOutBtn" onclick="logout()">Sign out</button>
      </aside>

      <main class="mainArea">

        <section id="screensView" class="view active">
          <div class="pageHeader">
            <h1>Screens</h1>
            <div class="sub" id="screenCount">0 screens</div>
          </div>

          <div class="card">
            <h2>Add a screen</h2>
            <div class="row">
              <input id="pairCode" placeholder="Pairing code (e.g. K7QX2M)" style="text-transform:uppercase" />
              <input id="pairName" placeholder="Screen name (e.g. Mall Entrance)" />
              <button onclick="addScreen()">Pair screen</button>
            </div>
          </div>

          <div class="card">
            <h2>All screens</h2>
            <table>
              <thead>
                <tr><th>Status</th><th>Name</th><th>Playlist</th><th>Last seen</th><th></th></tr>
              </thead>
              <tbody id="screensBody"></tbody>
            </table>
          </div>
        </section>

        <section id="playlistsView" class="view">
          <div class="pageHeader">
            <h1>Playlists</h1>
            <div class="sub">Create and manage ad rotations</div>
          </div>

          <div class="card">
            <h2>New playlist</h2>
            <div class="row">
              <input id="playlistName" placeholder="Playlist name" />
            </div>
            <div id="playlistItems"></div>
            <div class="row">
              <button class="secondary" onclick="addPlaylistItemRow()">+ Add item</button>
              <button onclick="savePlaylist()">Save playlist</button>
            </div>
          </div>
        </section>

      </main>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
